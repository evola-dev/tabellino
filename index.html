<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F2F4F1">
<title>Tabellino — calcetto, statistiche e pagelle</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F2F4F1;        /* sintetico slavato sotto i fari */
  --card:#FFFFFF;
  --ink:#0E1F1A;          /* verde campo quasi nero */
  --ink-soft:#5C6B64;
  --line:#DCE2DC;         /* riga di gesso */
  --bib:#FF4D2E;          /* pettorina */
  --grass:#12A06A;
  --gold:#E8B203;
  --bad:#D93025;
  --r:16px;
  --sh:0 1px 0 var(--line), 0 6px 20px -12px rgba(14,31,26,.25);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Instrument Sans",system-ui,-apple-system,sans-serif;
  font-size:15px; line-height:1.45;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
  overscroll-behavior-y:contain;
}
h1,h2,h3,.display{font-family:"Bricolage Grotesque","Instrument Sans",sans-serif;font-weight:800;letter-spacing:-.02em;margin:0}
.num{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
input,select{font:inherit;color:inherit}

/* ---------- shell ---------- */
.top{
  position:sticky;top:0;z-index:20;background:rgba(242,244,241,.86);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 18px 12px;padding-top:calc(14px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.top .eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.top h1{font-size:22px}
.wrap{max-width:640px;margin:0 auto;padding:18px}
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border-radius:12px;color:var(--ink-soft);font-size:10.5px;font-weight:600;letter-spacing:.02em}
.nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav button.on{color:var(--ink)}
.nav button.on svg{stroke:var(--bib)}

/* ---------- atoms ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.pad{padding:16px}
.row{display:flex;align-items:center;gap:12px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px}
.muted{color:var(--ink-soft)}
.small{font-size:12.5px}
.tiny{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft)}
.btn{background:var(--ink);color:#fff;border-radius:12px;padding:13px 18px;font-weight:600;text-align:center;display:block;width:100%}
.btn.bib{background:var(--bib)}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.45}
.chip{border:1.5px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;background:#fff}
.chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
.field{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:6px}
.field:focus{outline:2px solid var(--bib);outline-offset:1px;border-color:transparent}
label.lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--ink-soft)}
.hr{height:1px;background:var(--line);margin:14px 0}
.av{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;flex:none;font-family:"Bricolage Grotesque",sans-serif}
.empty{text-align:center;padding:44px 20px;color:var(--ink-soft)}
.empty .display{font-size:19px;color:var(--ink);margin-bottom:6px}
.sec{margin:26px 0 10px;display:flex;align-items:baseline;justify-content:space-between}
.sec h2{font-size:17px}

/* ---------- scoreboard ---------- */
.board{background:var(--ink);color:#fff;border-radius:20px;padding:18px;position:relative;overflow:hidden}
.board::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 34px);pointer-events:none}
.board .teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.board .tname{font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;opacity:.75;text-align:center}
.board .sc{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:46px;line-height:1;text-align:center;font-variant-numeric:tabular-nums}
.board .colon{opacity:.35;font-size:26px;font-family:"JetBrains Mono",monospace}
.clock{margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.clock .t{font-family:"JetBrains Mono",monospace;font-size:15px;letter-spacing:.06em;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:999px}
.clock button{color:#fff;font-size:12px;font-weight:600;background:rgba(255,255,255,.12);padding:6px 14px;border-radius:999px}

/* ---------- lineups ---------- */
.pitch{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.side{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.side .hd{padding:9px 12px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:#fff}
.pl{display:flex;align-items:center;gap:9px;padding:10px 11px;border-top:1px solid var(--line);width:100%;text-align:left}
.pl:first-of-type{border-top:0}
.pl .nm{font-weight:600;font-size:13.5px;line-height:1.15;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl .st{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft)}
.pl:active{background:#F6F8F6}

/* ---------- feed ---------- */
.ev{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.ev .min{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink-soft);width:34px;flex:none}
.ev .x{margin-left:auto;color:var(--ink-soft);font-size:17px;padding:0 6px}

/* ---------- sheet ---------- */
.scrim{position:fixed;inset:0;background:rgba(14,31,26,.42);z-index:40;opacity:0;pointer-events:none;transition:opacity .18s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--card);border-radius:22px 22px 0 0;
  padding:8px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(102%);transition:transform .24s cubic-bezier(.2,.8,.25,1);max-height:88vh;overflow:auto}
.sheet.on{transform:none}
.grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 12px}
.acts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.act{border:1.5px solid var(--line);border-radius:14px;padding:11px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:600;line-height:1.2;text-align:center;background:#fff}
.act .i{font-size:20px}
.act:active{border-color:var(--ink);background:#F6F8F6}
.act.neg{border-style:dashed}
.act.neg .i{filter:grayscale(.35)}

/* ---------- pagella (signature) ---------- */
.pagella{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.pagella .ph{padding:14px 16px;border-bottom:2px solid var(--ink);display:flex;align-items:baseline;justify-content:space-between}
.pagella .ph h2{font-size:20px}
.prow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px dashed var(--line)}
.prow:last-child{border-bottom:0}
.prow .voto{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:26px;width:66px;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.03em}
.v-hi{color:var(--grass)}.v-mid{color:var(--ink)}.v-lo{color:var(--bad)}
.prow .who{flex:1;min-width:0}
.prow .who b{font-size:14.5px}
.prow .who .line{font-size:11.5px;color:var(--ink-soft);font-family:"JetBrains Mono",monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.awards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.aw{position:relative;background:#fff;border:1.5px solid var(--ink);border-radius:14px;padding:13px 12px}
.aw .tiny{color:var(--bib)}
.aw b{display:block;font-family:"Bricolage Grotesque",sans-serif;font-size:15px;margin-top:3px;line-height:1.2}
.aw .why{font-size:11px;color:var(--ink-soft);font-family:"JetBrains Mono",monospace;margin-top:2px}
.aw.stamp{border-color:var(--gold);background:linear-gradient(180deg,#FFFDF3,#fff)}
.aw.worst{border-style:dashed;border-color:var(--bad)}
.aw.worst .tiny{color:var(--bad)}

.telecronaca{background:var(--ink);color:#fff;border-radius:var(--r);padding:16px;margin-top:12px}
.telecronaca p{margin:8px 0 0;font-size:14px;line-height:1.55;opacity:.94}
.telecronaca .tiny{color:#8FE3C0}

/* ---------- stats ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);text-align:right;padding:0 0 8px;font-weight:600}
.tbl th:first-child{text-align:left}
.tbl td{padding:9px 0;border-top:1px solid var(--line);text-align:right;font-family:"JetBrains Mono",monospace}
.tbl td:first-child{text-align:left;font-family:"Instrument Sans",sans-serif;font-weight:600}
.bar{height:5px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:var(--bib)}
.toast{position:fixed;left:50%;bottom:96px;transform:translate(-50%,20px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.2s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translate(-50%,0)}
/* ---------- premium ---------- */
.lock{position:relative;border-radius:var(--r);overflow:hidden}
.lock .blur{filter:blur(5px) saturate(.7);opacity:.55;pointer-events:none;user-select:none}
.lock .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;padding:24px 20px;background:linear-gradient(180deg,rgba(242,244,241,.55),rgba(242,244,241,.9))}
.lock .ov .tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--bib)}
.lock .ov h3{font-size:18px}
.lock .ov p{font-size:12.5px;color:var(--ink-soft);max-width:34ch;margin:2px 0 4px}
.stepper{display:flex;align-items:center;gap:8px;flex:none}
.stepper button{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line);font-weight:800;font-size:17px;line-height:1;background:#fff}
.stepper button:active{background:#F6F8F6}
.stepper span{width:34px;text-align:center;font-weight:700;font-size:15px}
.pro-badge{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--gold);border:1px solid var(--gold);border-radius:999px;padding:3px 8px;align-self:center}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="top">
  <div>
    <div class="eyebrow" id="eyebrow">Il campetto</div>
    <h1 id="title">Giovedì</h1>
  </div>
  <button class="chip" id="topAction" hidden></button>
</header>

<main class="wrap" id="view"></main>

<nav class="nav" id="nav"></nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Modello dati + persistenza
   ============================================================ */
const KEY = 'calcetto.db.v1';

/* Le funzioni Pro sono disattivate. Metti true SOLO in locale per provarle. */
const PRO_PREVIEW = false;

const Store = {
  async get(k){
    if (window.storage) { try { const r = await window.storage.get(k); return r ? r.value : null; } catch(e){ return null; } }
    try { return localStorage.getItem(k); } catch(e){ return null; }
  },
  async set(k,v){
    if (window.storage) { try { await window.storage.set(k,v); return; } catch(e){} }
    try { localStorage.setItem(k,v); } catch(e){}
  }
};
let db = { players: [], matches: [] };
let S = { view:'home', matchId:null, sheetPlayer:null, clock:{run:false,base:0,start:0} };

const save = () => Store.set(KEY, JSON.stringify(db));
const uid = () => Math.random().toString(36).slice(2,9);

/* ---- catalogo eventi: l'unica fonte di verità di gol, voti e classifiche ---- */
const EV = [
  {k:'gol',        l:'Gol',              i:'⚽', c:'att', w:3.0,  goal:1},
  {k:'assist',     l:'Assist',           i:'🎯', c:'att', w:2.0,  ass:1},
  {k:'tiro',       l:'Tiro in porta',    i:'🥅', c:'att', w:0.4},
  {k:'palo',       l:'Palo o traversa',  i:'🎱', c:'att', w:0.7},
  {k:'dribbling',  l:'Dribbling',        i:'🕺', c:'att', w:0.4},
  {k:'corner',     l:'Corner battuto',   i:'🚩', c:'att', w:0.15},
  {k:'sbagliato',  l:'Gol divorato',     i:'🙈', c:'att', w:-0.9, neg:1},
  {k:'contrasto',  l:'Contrasto vinto',  i:'🛡️', c:'dif', w:0.7,  def:1},
  {k:'intercetto', l:'Intercetto',       i:'✋', c:'dif', w:0.6,  def:1},
  {k:'salvataggio',l:'Salvataggio linea',i:'🧱', c:'dif', w:1.6,  def:1},
  {k:'persa',      l:'Palla persa',      i:'💨', c:'dif', w:-0.7, neg:1},
  {k:'autogol',    l:'Autogol',          i:'🤦', c:'dif', w:-2.5, own:1, neg:1},
  {k:'parata',     l:'Parata',           i:'🧤', c:'por', w:0.8,  def:1},
  {k:'parataDec',  l:'Parata decisiva',  i:'🦸', c:'por', w:1.9,  def:1},
  {k:'papera',     l:'Papera',           i:'🥚', c:'por', w:-1.6, neg:1, pap:1},
  {k:'falloSub',   l:'Fallo subito',     i:'🤕', c:'disc',w:0.15},
  {k:'fallo',      l:'Fallo commesso',   i:'⚠️', c:'disc',w:-0.3, foul:1},
  {k:'giallo',     l:'Giallo',           i:'🟨', c:'disc',w:-0.7, foul:1},
  {k:'rosso',      l:'Rosso',            i:'🟥', c:'disc',w:-2.0, foul:1},
];
const evOf = k => EV.find(e=>e.k===k);
const CATS = {att:'Attacco', dif:'Difesa e possesso', por:'Portiere', disc:'Disciplina'};
const ROLES = ['POR','DIF','CEN','ATT'];

/* ============================================================
   Calcoli: punteggio, pagella, premi, rating
   ============================================================ */
function score(m){
  const s = {A:0,B:0};
  m.events.forEach(e=>{
    const d = evOf(e.k); if(!d) return;
    const side = teamOf(m, e.p);
    if (d.goal) s[side]++;
    if (d.own)  s[side==='A'?'B':'A']++;
  });
  return s;
}
const teamOf = (m,pid) => m.teams.A.players.includes(pid) ? 'A' : 'B';
const player = id => db.players.find(p=>p.id===id) || {name:'?',id:'?'};

function tally(m, pid){
  const t = {gol:0,assist:0,def:0,neg:0,foul:0,pap:0,sub:0,pts:0,n:0};
  m.events.filter(e=>e.p===pid).forEach(e=>{
    const d = evOf(e.k); if(!d) return;
    t.pts += d.w; t.n++;
    if(d.goal) t.gol++; if(d.ass) t.assist++; if(d.def) t.def++;
    if(d.neg) t.neg++; if(d.foul) t.foul++; if(d.pap) t.pap++;
  });
  // il portiere paga i gol subiti
  const side = teamOf(m,pid), opp = side==='A'?'B':'A';
  if (m.teams[side].gk === pid){ const s = score(m); t.sub = s[opp]; t.pts -= 0.35 * t.sub; }
  return t;
}

function voto(m, pid){
  const t = tally(m,pid), s = score(m), side = teamOf(m,pid), opp = side==='A'?'B':'A';
  let v = 6 + t.pts;
  if (s[side] > s[opp]) v += 0.3; else if (s[side] < s[opp]) v -= 0.3;
  return Math.max(3.5, Math.min(10, Math.round(v*10)/10));
}

function pagella(m){
  const all = [...m.teams.A.players, ...m.teams.B.players];
  return all.map(pid=>({pid, v:voto(m,pid), t:tally(m,pid)})).sort((a,b)=>b.v-a.v);
}

function awards(m){
  const rows = pagella(m); if(!rows.length) return [];
  const played = rows.filter(r=>r.t.n>0);
  const pool = played.length ? played : rows;
  const a = [];
  const best = rows[0];
  a.push({cls:'stamp', tag:'Pallone d\'oro', name:player(best.pid).name, why:`voto ${best.v.toFixed(1)}`});

  const cap = [...pool].sort((x,y)=> y.t.gol-x.t.gol || y.v-x.v)[0];
  if (cap && cap.t.gol>0) a.push({tag:'Capocannoniere', name:player(cap.pid).name, why:`${cap.t.gol} gol`});

  const mur = [...pool].sort((x,y)=> y.t.def-x.t.def || y.v-x.v)[0];
  if (mur && mur.t.def>0) a.push({tag:'Il muro', name:player(mur.pid).name, why:`${mur.t.def} interventi`});

  const reg = [...pool].sort((x,y)=> y.t.assist-x.t.assist || y.v-x.v)[0];
  if (reg && reg.t.assist>0) a.push({tag:'Regista', name:player(reg.pid).name, why:`${reg.t.assist} assist`});

  const worst = played.length ? played[played.length-1] : rows[rows.length-1];
  if (worst && worst.pid !== best.pid)
    a.push({cls:'worst', tag:'Ciabatta d\'oro', name:player(worst.pid).name, why:`voto ${worst.v.toFixed(1)}`});

  const mac = [...pool].sort((x,y)=> y.t.foul-x.t.foul)[0];
  if (mac && mac.t.foul>=3) a.push({tag:'Il macellaio', name:player(mac.pid).name, why:`${mac.t.foul} falli`});

  const pap = [...pool].sort((x,y)=> y.t.pap-x.t.pap)[0];
  if (pap && pap.t.pap>0) a.push({tag:'Papera d\'oro', name:player(pap.pid).name, why:`${pap.t.pap} papere`});

  return a.slice(0,6);
}

/* rating dinamico: si ricalcola replay-ando lo storico in ordine di data.
   Così correggere una partita conclusa aggiorna tutto senza doppi conteggi. */
let RATINGS = {};
function computeRatings(){
  const r = {};
  const done = db.matches.filter(m=>m.status==='done')
    .sort((a,b)=> a.date.localeCompare(b.date) || String(a.created||0).localeCompare(String(b.created||0)));
  done.forEach(m=> pagella(m).forEach(row=>{
    if (r[row.pid]==null) r[row.pid]=65;
    r[row.pid] = Math.round((r[row.pid]*0.82 + row.v*10*0.18)*10)/10;
  }));
  return r;
}
const rt = pid => (RATINGS[pid] ?? 65);

/* ============================================================
   Sorteggio bilanciato (il vero risparmio di litigi del giovedì)
   ============================================================ */
function draft(ids){
  const ps = ids.map(id=>player(id)).map(p=>({id:p.id, r:rt(p.id), gk:p.role==='POR'}));
  ps.sort((a,b)=>b.r-a.r);
  let A=[], B=[];
  // i due portieri vanno separati
  const gks = ps.filter(p=>p.gk);
  if (gks.length>=2){ A.push(gks[0]); B.push(gks[1]); }
  const rest = ps.filter(p=>!A.includes(p) && !B.includes(p));
  rest.forEach(p=>{
    const sa = A.reduce((s,x)=>s+x.r,0), sb = B.reduce((s,x)=>s+x.r,0);
    if (A.length < B.length) A.push(p);
    else if (B.length < A.length) B.push(p);
    else (sa<=sb ? A : B).push(p);
  });
  // rifinitura: scambi che riducono il divario
  const sum = t => t.reduce((s,x)=>s+x.r,0);
  for (let it=0; it<160; it++){
    let gap = Math.abs(sum(A)-sum(B)), moved = false;
    for (let i=0;i<A.length;i++) for (let j=0;j<B.length;j++){
      if (A[i].gk || B[j].gk) continue;
      const g = Math.abs((sum(A)-A[i].r+B[j].r) - (sum(B)-B[j].r+A[i].r));
      if (g < gap - 0.01){ const t=A[i]; A[i]=B[j]; B[j]=t; gap=g; moved=true; }
    }
    if (!moved) break;
  }
  return {
    A:{players:A.map(p=>p.id), gk:(A.find(p=>p.gk)||{}).id||null, val:Math.round(sum(A))},
    B:{players:B.map(p=>p.id), gk:(B.find(p=>p.gk)||{}).id||null, val:Math.round(sum(B))}
  };
}

/* ============================================================
   Statistiche di carriera
   ============================================================ */
function career(pid){
  const c = {n:0,w:0,d:0,l:0,gol:0,assist:0,def:0,foul:0,vs:0,mvp:0,ciab:0,best:0,streak:0};
  const done = db.matches.filter(m=>m.status==='done' && [...m.teams.A.players,...m.teams.B.players].includes(pid))
                         .sort((a,b)=> a.date.localeCompare(b.date));
  done.forEach(m=>{
    const s=score(m), side=teamOf(m,pid), opp=side==='A'?'B':'A', t=tally(m,pid), v=voto(m,pid);
    c.n++; c.gol+=t.gol; c.assist+=t.assist; c.def+=t.def; c.foul+=t.foul; c.vs+=v;
    c.best = Math.max(c.best, v);
    if (s[side]>s[opp]){ c.w++; c.streak = c.streak>=0 ? c.streak+1 : 1; }
    else if (s[side]<s[opp]){ c.l++; c.streak = c.streak<=0 ? c.streak-1 : -1; }
    else { c.d++; c.streak = 0; }
    const aw = awards(m);
    if (aw.some(a=>a.tag==="Pallone d'oro" && a.name===player(pid).name)) c.mvp++;
    if (aw.some(a=>a.tag==="Ciabatta d'oro" && a.name===player(pid).name)) c.ciab++;
  });
  c.media = c.n ? c.vs/c.n : 0;
  c.winPct = c.n ? Math.round(c.w/c.n*100) : 0;
  return c;
}

function duos(){
  const map = {};
  db.matches.filter(m=>m.status==='done').forEach(m=>{
    const s = score(m);
    ['A','B'].forEach(side=>{
      const opp = side==='A'?'B':'A';
      const res = s[side]>s[opp] ? 1 : s[side]<s[opp] ? 0 : .5;
      const ps = m.teams[side].players;
      for(let i=0;i<ps.length;i++) for(let j=i+1;j<ps.length;j++){
        const k = [ps[i],ps[j]].sort().join('|');
        map[k] = map[k] || {n:0,w:0};
        map[k].n++; map[k].w += res;
      }
    });
  });
  return Object.entries(map).filter(([,v])=>v.n>=2)
    .map(([k,v])=>({a:k.split('|')[0], b:k.split('|')[1], n:v.n, pct:Math.round(v.w/v.n*100)}))
    .sort((x,y)=> y.pct-x.pct || y.n-x.n);
}

/* nemesi: la bestia nera è l'avversario contro cui vinci di meno */
function nemesi(){
  const h = {};
  db.matches.filter(m=>m.status==='done').forEach(m=>{
    const s = score(m);
    ['A','B'].forEach(side=>{
      const opp = side==='A'?'B':'A';
      const r = s[side]>s[opp] ? 1 : s[side]<s[opp] ? 0 : .5;
      m.teams[side].players.forEach(p=> m.teams[opp].players.forEach(o=>{
        h[p]=h[p]||{}; h[p][o]=h[p][o]||{n:0,w:0}; h[p][o].n++; h[p][o].w+=r;
      }));
    });
  });
  const out = [];
  Object.entries(h).forEach(([p,opps])=> Object.entries(opps).forEach(([o,v])=>{
    if (v.n>=2) out.push({p, o, n:v.n, pct:Math.round(v.w/v.n*100)});
  }));
  return out.sort((a,b)=> a.pct-b.pct || b.n-a.n);
}

      <div><div class="tname">${esc(m.teams.B.name)}</div><div class="sc">${s.B}</div></div>
    </div>
    <div class="clock">
      <span class="t" id="ct">${clockTxt()}</span>
      <button onclick="toggleClock()">${S.clock.run?'Pausa':'Avvia'}</button>
    </div>
  </div>
  ${pitchHTML(m)}
  <div class="sec"><h2>Tabellino</h2><span class="tiny">${m.events.length} eventi</span></div>
  <div class="card pad">${feedHTML(m)}</div>
  <div style="height:14px"></div>
  <button class="btn bib" onclick="endMatch()">Chiudi la partita e apri le pagelle</button>`;
}
window.toggleClock = ()=>{ const c=S.clock;
  if(c.run){ c.base += Date.now()-c.start; c.run=false; } else { c.start=Date.now(); c.run=true; }
  render(); };
setInterval(()=>{ if(S.view==='live' && S.clock.run && el('ct')) el('ct').textContent = clockTxt(); }, 1000);

window.pickPlayer = pid => {
  const m = cur(), p = player(pid);
  const groups = Object.entries(CATS).map(([c,label])=>`
    <div class="tiny" style="margin:14px 0 6px">${label}</div>
    <div class="acts">${EV.filter(e=>e.c===c).map(e=>`
      <button class="act ${e.w<0?'neg':''}" onclick="addEv('${pid}','${e.k}')">
        <span class="i">${e.i}</span><span>${e.l}</span></button>`).join('')}</div>`).join('');
  openSheet(`
    <div class="row" style="margin-bottom:4px">
      ${avatar(p)}
      <div style="flex:1">
        <div class="display" style="font-size:18px">${esc(p.name)}</div>
        <div class="tiny">${m.teams[teamOf(m,pid)].name} · ${p.role||'CEN'} ${m.teams[teamOf(m,pid)].gk===pid?'· portiere':''}</div>
      </div>
      <button class="chip" onclick="setGk('${pid}')">🧤 Portiere</button>
    </div>${groups}`);
};
window.setGk = pid => { const m=cur(); const t=m.teams[teamOf(m,pid)]; t.gk = t.gk===pid?null:pid; save(); closeSheet(); render(); };
window.addEv = (pid,k)=>{ const m=cur();
  const min = m.status==='done' ? (m.minutes||0) : mins();
  m.events.push({id:uid(), p:pid, k, min, ts:Date.now()}); save(); closeSheet(); render();
  toast(`${evOf(k).i} ${evOf(k).l} — ${player(pid).name}`); };
window.undo = id => { const m=cur(); m.events = m.events.filter(e=>e.id!==id); save(); render(); };
window.endMatch = ()=>{ const m=cur(); m.status='done'; m.minutes=mins(); save(); go('report', m.id); };

function vReport(){
  const m = cur(); if(!m) return vHome();
  const s = score(m), rows = pagella(m), aw = awards(m);
  const winner = s.A>s.B ? m.teams.A.name : s.B>s.A ? m.teams.B.name : null;
  return `
  <div class="board">
    <div class="teams">
      <div><div class="tname">${esc(m.teams.A.name)}</div><div class="sc">${s.A}</div></div>
      <div class="colon">:</div>
      <div><div class="tname">${esc(m.teams.B.name)}</div><div class="sc">${s.B}</div></div>
    </div>
    <div class="clock"><span class="t">${winner?esc(winner)+' 🏆':'Pareggio'} · ${dLabel(m.date)}</span></div>
  </div>

  <div class="sec"><h2>Premi</h2><span class="tiny">assegnati dal tabellino</span></div>
  <div class="awards">
    ${aw.map(a=>`<div class="aw ${a.cls||''}"><div class="tiny">${a.tag}</div><b>${esc(a.name)}</b><div class="why">${a.why}</div></div>`).join('')}
  </div>

  <div class="sec"><h2>Le pagelle</h2></div>
  <div class="pagella">
    <div class="ph"><h2>Voti</h2><span class="tiny">base 6 · calcolata sul tabellino</span></div>
    ${rows.map(r=>{
      const p=player(r.pid), t=r.t;
      const line = [t.gol?`${t.gol} gol`:'', t.assist?`${t.assist} assist`:'', t.def?`${t.def} interventi`:'',
                    t.sub?`${t.sub} subiti`:'', t.foul?`${t.foul} falli`:''].filter(Boolean).join(' · ') || 'nessuna giocata registrata';
      return `<div class="prow">
        ${avatar(p)}
        <div class="who"><b>${esc(p.name)}</b><div class="line">${line}</div></div>
        <div class="voto ${vClass(r.v)}">${r.v.toFixed(1)}</div>
      </div>`;
    }).join('')}
  </div>

  <div class="sec"><h2>Correzioni</h2><span class="tiny">modifica il tabellino a partita conclusa</span></div>
  <button class="btn ghost" onclick="toggleEdit()">${S.edit?'✓ Fatto, chiudi le correzioni':'✏️ Correggi tabellino e voti'}</button>
  ${S.edit ? `
    <p class="small muted" style="margin:10px 0">Tocca un giocatore per aggiungere una giocata, o ✕ per togliere un evento sbagliato. Voti, premi e classifiche si aggiornano subito.</p>
    ${pitchHTML(m)}
    <div class="sec"><h2>Tabellino</h2><span class="tiny">${m.events.length} eventi</span></div>
    <div class="card pad">${feedHTML(m)}</div>
  ` : ''}

  <div class="sec"><h2>Voto dei compagni</h2><span class="pro-badge">Pro</span></div>
  ${peerCard(m)}

  <div id="tele"></div>
  <div style="height:12px"></div>
  <button class="btn" onclick="telecronaca()">📻 Genera la telecronaca del giovedì</button>
  <div style="height:8px"></div>
  <button class="btn ghost" onclick="shareMatch()">Condividi il tabellino su WhatsApp</button>
  <div style="height:8px"></div>
  <button class="btn ghost" onclick="go('home')">Torna alle partite</button>`;
}
window.toggleEdit = ()=>{ S.edit = !S.edit; render(); };

/* Telecronaca: il tabellino diventa un pezzo di giornale, con sfottò */
window.telecronaca = async ()=>{
  const m = cur(), s = score(m), rows = pagella(m), aw = awards(m);
  const box = el('tele');
  box.innerHTML = `<div class="telecronaca"><div class="tiny">Radio Campetto</div><p>Sto guardando il replay…</p></div>`;
  const tab = rows.map(r=>{
    const t=r.t;
    return `${player(r.pid).name} (${m.teams[teamOf(m,r.pid)].name}) voto ${r.v.toFixed(1)}: ${t.gol} gol, ${t.assist} assist, ${t.def} interventi difensivi, ${t.neg} errori, ${t.foul} falli${t.sub?`, ${t.sub} gol subiti da portiere`:''}`;
  }).join('\n');
  const prompt = `Sei un radiocronista sportivo italiano che commenta una partita di calcetto tra amici. Tono: ironico, affettuoso, sfottò da spogliatoio, mai volgare né offensivo sul fisico o sulla persona. Scrivi 3 brevi paragrafi (max 130 parole totali): il racconto del match, l'elogio del migliore, la bonaria presa in giro del peggiore.

Risultato: ${m.teams.A.name} ${s.A} - ${s.B} ${m.teams.B.name}
Premi: ${aw.map(a=>`${a.tag}: ${a.name} (${a.why})`).join('; ')}
Pagelle:
${tab}

Rispondi solo con il testo, senza titoli né elenchi.`;
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const txt = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n');
    m.tele = txt; save();
    box.innerHTML = `<div class="telecronaca"><div class="tiny">Radio Campetto</div>${
      txt.split('\n').filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join('')}</div>`;
  }catch(e){
    box.innerHTML = `<div class="telecronaca"><div class="tiny">Radio Campetto</div><p>La linea è caduta. Riprova quando torni online.</p></div>`;
  }
};

window.shareMatch = ()=>{
  const m=cur(), s=score(m), rows=pagella(m), aw=awards(m);
  const txt = `⚽ ${m.teams.A.name} ${s.A}-${s.B} ${m.teams.B.name} — ${dLabel(m.date)}\n\n`
    + aw.map(a=>`${a.tag==="Ciabatta d'oro"?'🩴':'🏆'} ${a.tag}: ${a.name} (${a.why})`).join('\n')
    + `\n\nPagelle:\n` + rows.map(r=>`${r.v.toFixed(1)} ${player(r.pid).name}`).join('\n');
  if (navigator.share) navigator.share({text:txt}).catch(()=>{});
  else { navigator.clipboard?.writeText(txt); toast('Tabellino copiato'); }
};

function vRosa(){
  const ps = [...db.players].sort((a,b)=> rt(b.id)-rt(a.id));
  return `
  <div class="card pad">
    <label class="lab">Nuovo giocatore</label>
    <input class="field" id="pName" placeholder="Nome o soprannome">
    <div class="row" style="margin-top:10px;flex-wrap:wrap">
      ${ROLES.map((r,i)=>`<button class="chip ${i===2?'on':''}" data-role="${r}" onclick="pickRole(this)">${r}</button>`).join('')}
    </div>
    <div style="height:12px"></div>
    <button class="btn" onclick="addPlayer()">Aggiungi alla rosa</button>
  </div>
  <div class="sec"><h2>Rosa</h2><span class="tiny">${ps.length} giocatori</span></div>
  ${ps.length ? ps.map(p=>{
    const c = career(p.id);
    return `<div class="card pad" style="margin-bottom:8px">
      <div class="row">
        ${avatar(p)}
        <div style="flex:1;min-width:0">
          <div class="spread"><b>${esc(p.name)}</b><span class="num" style="font-weight:700">${rt(p.id)}</span></div>
          <div class="small muted">${p.role} · ${c.n} partite · ${c.gol}G ${c.assist}A · media ${c.n?c.media.toFixed(1):'–'}</div>
          <div class="bar"><i style="width:${Math.max(4,Math.min(100,rt(p.id)))}%"></i></div>
        </div>
        <button class="chip" style="padding:7px 10px" onclick="editPlayer('${p.id}')">✎</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty"><div class="display">Rosa vuota</div>Aggiungi i primi nomi qui sopra.</div>`}`;
}
let newRole='CEN';
window.pickRole = b => { newRole=b.dataset.role; b.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c===b)); };
window.addPlayer = ()=>{
  const n = el('pName').value.trim(); if(!n) return toast('Serve un nome');
  db.players.push({id:uid(), name:n, role:newRole, rating:65, avail:true}); save(); render(); toast(`${n} in rosa`);
};

let editRole='CEN';
window.editPlayer = id => {
  const p = player(id); editRole = p.role || 'CEN';
  openSheet(`
    <div class="display" style="font-size:19px;margin:2px 0 12px">Modifica giocatore</div>
    <label class="lab">Nome</label>
    <input class="field" id="epName" value="${esc(p.name)}">
    <label class="lab" style="display:block;margin-top:12px">Ruolo</label>
    <div class="row" style="margin-top:6px;flex-wrap:wrap">
      ${ROLES.map(r=>`<button class="chip ${r===editRole?'on':''}" data-erole="${r}" onclick="pickEditRole(this)">${r}</button>`).join('')}
    </div>
    <div style="height:16px"></div>
    <button class="btn" onclick="saveEditPlayer('${id}')">Salva</button>
    <div style="height:8px"></div>
    <button class="btn ghost" style="color:var(--bad);border-color:var(--bad)" onclick="delPlayer('${id}')">Togli dalla rosa</button>
  `);
};
window.pickEditRole = b => { editRole=b.dataset.erole; b.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c===b)); };
window.saveEditPlayer = id => {
  const p = player(id), n = el('epName').value.trim();
  if(!n) return toast('Serve un nome');
  p.name = n; p.role = editRole; save(); closeSheet(); render(); toast('Giocatore aggiornato');
};
window.delPlayer = id => { if(confirm('Togliere dalla rosa? Le partite giocate restano.')){ db.players=db.players.filter(p=>p.id!==id); save(); closeSheet(); render(); } };

function vStats(){
  const ps = db.players.map(p=>({p, c:career(p.id)})).filter(x=>x.c.n>0);
  if(!ps.length) return `<div class="empty"><div class="display">Ancora nessun dato</div>Le statistiche compaiono dopo la prima partita chiusa.</div>`;
  const sortBy = S.sort || 'media';
  const keys = [['media','Media voto'],['gol','Gol'],['assist','Assist'],['winPct','% vittorie'],['def','Interventi']];
  ps.sort((a,b)=> b.c[sortBy]-a.c[sortBy]);
  const tot = db.matches.filter(m=>m.status==='done');
  const golTot = tot.reduce((s,m)=>{const x=score(m); return s+x.A+x.B;},0);
  return `
  <div class="card pad">
    <div class="spread"><div><div class="tiny">Partite giocate</div><div class="display" style="font-size:26px">${tot.length}</div></div>
      <div style="text-align:right"><div class="tiny">Gol totali</div><div class="display" style="font-size:26px">${golTot}</div></div>
      <div style="text-align:right"><div class="tiny">Media a partita</div><div class="display" style="font-size:26px">${tot.length?(golTot/tot.length).toFixed(1):'0'}</div></div>
    </div>
  </div>
  <div class="sec"><h2>Classifica individuale</h2></div>
  <div class="row" style="flex-wrap:wrap;margin-bottom:10px">
    ${keys.map(([k,l])=>`<button class="chip ${sortBy===k?'on':''}" onclick="S.sort='${k}';render()">${l}</button>`).join('')}
  </div>
  <div class="card pad">
    <table class="tbl">
      <tr><th>Giocatore</th><th>PG</th><th>G</th><th>A</th><th>Dif</th><th>V%</th><th>Media</th></tr>
      ${ps.map(({p,c})=>`<tr>
        <td>${esc(p.name)}</td><td>${c.n}</td><td>${c.gol}</td><td>${c.assist}</td><td>${c.def}</td>
        <td>${c.winPct}</td><td style="font-weight:700" class="${vClass(c.media)}">${c.media.toFixed(1)}</td></tr>`).join('')}
    </table>
  </div>
  ${chimicaBlock()}`;
}

function vAlbo(){
  const done = db.matches.filter(m=>m.status==='done');
  if(!done.length) return `<div class="empty"><div class="display">L'albo d'oro è vergine</div>Chiudi una partita e i primi trofei trovano un padrone.</div>`;
  const count = {};
  done.forEach(m=> awards(m).forEach(a=>{
    count[a.tag] = count[a.tag]||{};
    count[a.tag][a.name] = (count[a.tag][a.name]||0)+1;
  }));
  const order = ["Pallone d'oro","Capocannoniere","Il muro","Regista","Ciabatta d'oro","Il macellaio","Papera d'oro"];
  return order.filter(t=>count[t]).map(t=>{
    const rows = Object.entries(count[t]).sort((a,b)=>b[1]-a[1]);
    const max = rows[0][1];
    return `<div class="sec"><h2>${t}</h2></div>
    <div class="card pad">
      ${rows.map(([n,c],i)=>`<div style="padding:7px 0">
        <div class="spread"><b>${i===0?'👑 ':''}${esc(n)}</b><span class="num">${c}</span></div>
        <div class="bar"><i style="width:${c/max*100}%;background:${t.includes('Ciabatta')||t.includes('Papera')?'var(--bad)':'var(--bib)'}"></i></div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

/* ============================================================
   Router
   ============================================================ */
const TITLES = {home:['Il campetto','Tabellino'], new:['Nuova partita','Chi scende in campo'],
  manual:['Nuova partita','Squadre a mano'],
  live:['Diretta','Tabellino live'], report:['Fine partita','Le pagelle'],
  rosa:['Squadra','La rosa'], stats:['Numeri','Statistiche'], albo:['Trofei','Albo d\'oro']};
function render(){
  RATINGS = computeRatings();
  const [eb, ti] = TITLES[S.view] || TITLES.home;
  el('eyebrow').textContent = eb; el('title').textContent = ti;
  const back = ['new','manual','live','report'].includes(S.view);
  const ta = el('topAction');
  ta.hidden = !back; ta.textContent = '← Indietro';
  ta.onclick = ()=> go(S.view==='manual' ? 'new' : 'home');
  const views = {home:vHome, new:vNew, manual:vManual, live:vLive, report:vReport, rosa:vRosa, stats:vStats, albo:vAlbo};
  el('view').innerHTML = (views[S.view]||vHome)();
  nav();
}

(async function boot(){
  const raw = await Store.get(KEY);
  if (raw) { try { db = JSON.parse(raw); } catch(e){} }
  db.players = db.players || []; db.matches = db.matches || [];
  db.premium = PRO_PREVIEW ? (db.premium || false) : false;
  render();
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
